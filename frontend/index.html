<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mortgage Calculator</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    input { margin: 5px; padding: 5px; }
    button { padding: 6px 12px; }
  </style>
</head>
<body>
  <h2>Mortgage Calculator</h2>
  <label>Principal (£): <input id="principal" type="number"></label><br>
  <label>Rate (%): <input id="rate" type="number" step="0.1"></label><br>
  <label>Years: <input id="years" type="number"></label><br>
  <button onclick="calculate()">Calculate</button>

  <div id="result" style="margin-top:20px; font-weight:bold;"></div>


  <script>
    async function calculate() {
      const data = {
        principal: parseInt(document.getElementById('principal').value),
        rate: parseFloat(document.getElementById('rate').value),
        years: parseInt(document.getElementById('years').value)
      };

      const response = await fetch('http://localhost:8080/calculate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await response.text();
      document.getElementById('result').innerText = `Monthly Payment: ${result}`;
    }
  </script>
</body>
</html>
